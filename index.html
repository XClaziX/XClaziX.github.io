<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>CLXON Studio — Games</title>
  <meta name="description" content="Indie Android games by CLXON Studio — ArrowBeasts and PATHORA." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700&family=Syne:wght@700;800&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg: #060c0e;
      --text: #f2f7f4;
      --muted: #8fa8a3;
      --mint: #2ee6a6;
      --line: rgba(255, 255, 255, 0.12);
    }

    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      font-family: "Outfit", system-ui, sans-serif;
      color: var(--text);
      background:
        radial-gradient(800px 400px at 70% -5%, rgba(46, 230, 166, 0.12), transparent 55%),
        radial-gradient(600px 360px at 10% 30%, rgba(255, 100, 160, 0.08), transparent 50%),
        #060c0e;
    }

    main {
      max-width: 880px;
      margin: 0 auto;
      padding: clamp(2rem, 6vw, 3.5rem) 1.1rem 3.5rem;
    }

    .brand {
      font-family: "Syne", sans-serif;
      font-weight: 800;
      font-size: clamp(2.2rem, 7vw, 3.4rem);
      letter-spacing: -0.03em;
      margin: 0;
      line-height: 1;
    }
    .tagline {
      margin: 0.65rem 0 0;
      color: var(--muted);
      font-size: 1.02rem;
      max-width: 32rem;
    }

    .games {
      display: grid;
      gap: 1.35rem;
      margin-top: 2.25rem;
    }

    .game {
      border-radius: 22px;
      overflow: hidden;
      border: 1px solid var(--line);
      background: #0b1518;
      box-shadow: 0 24px 60px rgba(0, 0, 0, 0.45);
      transition: transform 0.25s ease, box-shadow 0.25s ease, border-color 0.25s ease;
    }
    .game:hover {
      transform: translateY(-4px);
      border-color: rgba(46, 230, 166, 0.35);
      box-shadow: 0 30px 70px rgba(0, 0, 0, 0.55);
    }

    .banner {
      display: block;
      width: 100%;
      aspect-ratio: 1024 / 500;
      object-fit: cover;
      background: #0a1214;
    }

    .meta {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      justify-content: space-between;
      gap: 0.75rem 1.25rem;
      padding: 1rem 1.2rem 1.15rem;
    }
    .meta h2 {
      margin: 0;
      font-family: "Syne", sans-serif;
      font-size: 1.15rem;
      font-weight: 800;
      letter-spacing: -0.02em;
    }
    .pkg {
      margin: 0.15rem 0 0;
      color: var(--muted);
      font-size: 0.8rem;
    }
    .links {
      display: flex;
      flex-wrap: wrap;
      gap: 0.55rem;
    }
    .links a {
      text-decoration: none;
      color: #061014;
      background: var(--mint);
      font-weight: 700;
      font-size: 0.82rem;
      padding: 0.45rem 0.85rem;
      border-radius: 999px;
      transition: filter 0.2s ease, transform 0.2s ease;
    }
    .links a:hover {
      filter: brightness(1.08);
      transform: translateY(-1px);
    }
    .links a.ghost {
      background: transparent;
      color: var(--mint);
      border: 1px solid rgba(46, 230, 166, 0.45);
    }

    .foot {
      margin-top: 2.5rem;
      padding-top: 1.1rem;
      border-top: 1px solid var(--line);
      color: var(--muted);
      font-size: 0.88rem;
    }
    .foot a { color: var(--mint); }

    @media (prefers-reduced-motion: reduce) {
      .game { transition: none; }
    }
  </style>
</head>
<body>
  <main>
    <h1 class="brand">CLXON Studio</h1>
    <p class="tagline">Indie Android games.</p>

    <section class="games" aria-label="Games">
      <article class="game">
        <img
          class="banner"
          src="img/arrowbeasts-banner.png"
          width="1024"
          height="500"
          alt="ArrowBeasts: Escape Puzzle"
          loading="eager"
        />
        <div class="meta">
          <div>
            <h2>ArrowBeasts</h2>
            <p class="pkg">Escape Puzzle · com.clxon24.arrowpath</p>
          </div>
          <div class="links">
            <a href="https://xclazix.github.io/arrowbeasts-privacy/">Privacy</a>
            <a class="ghost" href="https://xclazix.github.io/arrowbeasts-privacy/delete-account.html">Account deletion</a>
          </div>
        </div>
      </article>

      <article class="game">
        <img
          class="banner"
          src="img/pathora-banner.png"
          width="1024"
          height="500"
          alt="PATHORA"
          loading="lazy"
        />
        <div class="meta">
          <div>
            <h2>PATHORA</h2>
            <p class="pkg">Energy Grid · com.clxon24.pathora</p>
          </div>
          <div class="links">
            <a href="https://xclazix.github.io/pathora-privacy/">Privacy</a>
          </div>
        </div>
      </article>
    </section>

    <p class="foot">
      AdMob authorization for all apps:
      <a href="/app-ads.txt">app-ads.txt</a>
    </p>
  </main>
</body>
</html>
